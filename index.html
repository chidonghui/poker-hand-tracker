<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Hand Tracker</title>
    <link rel="stylesheet" href="css/style.css?v=4">
</head>
<body>
    <div id="app">
        <!-- 记录页面 -->
        <div id="record-page" class="page active">
            <div class="page-title">手牌快速记录</div>
            
            <!-- 三列统计 -->
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="stat-num" id="today-count">0</div>
                    <div class="stat-name">手数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="today-profit">+0</div>
                    <div class="stat-name">盈亏</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="today-time">0h0m</div>
                    <div class="stat-name">时长</div>
                </div>
            </div>

            <!-- 输入显示 -->
            <div class="input-box">
                <div class="input-text" id="hand-input">输入手牌，如: AKS+15</div>
                <div class="input-example">示例: AKs+1500, JsTs-800, 99+500</div>
                <div class="cards-box" id="preview-area">
                    <div id="preview-cards"></div>
                </div>
            </div>

            <!-- 5列键盘 -->
            <div class="keypad">
                <div class="key-line">
                    <button class="k rank" data-rank="A">A</button>
                    <button class="k rank" data-rank="K">K</button>
                    <button class="k rank" data-rank="Q">Q</button>
                    <button class="k rank" data-rank="J">J</button>
                    <button class="k rank" data-rank="T">T</button>
                </div>
                <div class="key-line">
                    <button class="k rank" data-rank="9">9</button>
                    <button class="k rank" data-rank="8">8</button>
                    <button class="k rank" data-rank="7">7</button>
                    <button class="k rank" data-rank="6">6</button>
                    <button class="k rank" data-rank="5">5</button>
                </div>
                <div class="key-line">
                    <button class="k rank" data-rank="4">4</button>
                    <button class="k rank" data-rank="3">3</button>
                    <button class="k rank" data-rank="2">2</button>
                    <button class="k suit" data-key="s">♠</button>
                    <button class="k suit red" data-key="h">♥</button>
                </div>
                <div class="key-line">
                    <button class="k suit red" data-key="d">♦</button>
                    <button class="k suit" data-key="c">♣</button>
                    <button class="k" data-key="s-suited">s</button>
                    <button class="k" data-key="o">o</button>
                    <button class="k action" data-key="+">+</button>
                </div>
                <div class="key-line">
                    <button class="k action" data-key="-">-</button>
                    <button class="k num" data-key="0">0</button>
                    <button class="k num" data-key="00">00</button>
                    <button class="k num" data-key="000">000</button>
                    <button class="k del" data-key="backspace">⌫</button>
                </div>
            </div>

            <button class="btn-save" id="save-btn">记录手牌</button>
        </div>

        <!-- 复盘页面 -->
        <div id="review-page" class="page">
            <div class="page-title">手牌复盘</div>
            <div class="filter-bar">
                <input type="date" id="date-picker">
            </div>
            <div class="data-grid">
                <div class="data-cell">
                    <div class="data-val" id="total-hands">0</div>
                    <div class="data-label">总手数</div>
                </div>
                <div class="data-cell">
                    <div class="data-val" id="total-amount">0</div>
                    <div class="data-label">实际盈亏</div>
                </div>
                <div class="data-cell">
                    <div class="data-val" id="total-ev">0</div>
                    <div class="data-label">EV盈亏</div>
                </div>
                <div class="data-cell">
                    <div class="data-val" id="diff-ev">0</div>
                    <div class="data-label">差距</div>
                </div>
            </div>
            <div class="sort-row">
                <span>排序:</span>
                <button class="sort-tag active" data-sort="time">时间</button>
                <button class="sort-tag" data-sort="amount">盈亏</button>
                <button class="sort-tag" data-sort="ev">EV</button>
                <button class="sort-dir" id="order-btn">↓</button>
            </div>
            <div class="list-box" id="hand-list"></div>
        </div>

        <!-- 统计页面 -->
        <div id="stats-page" class="page">
            <div class="page-title">数据统计</div>
            <div class="empty-box">统计功能开发中...</div>
        </div>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="record">
                <span class="icon">📝</span>
                <span>记录</span>
            </button>
            <button class="nav-item" data-page="review">
                <span class="icon">📊</span>
                <span>复盘</span>
            </button>
            <button class="nav-item" data-page="stats">
                <span class="icon">📈</span>
                <span>统计</span>
            </button>
        </nav>

        <!-- 花色弹窗 -->
        <div class="suit-dialog" id="suit-popup" style="display: none;">
            <div class="dialog-title">选择花色</div>
            <div class="suit-options">
                <button class="suit-btn" data-suit="s">♠<span>黑桃</span></button>
                <button class="suit-btn red" data-suit="h">♥<span>红心</span></button>
                <button class="suit-btn red" data-suit="d">♦<span>方块</span></button>
                <button class="suit-btn" data-suit="c">♣<span>梅花</span></button>
            </div>
            <button class="cancel-btn" id="suit-cancel">取消</button>
        </div>
        <div class="overlay" id="popup-overlay" style="display: none;"></div>
    </div>

    <script src="js/app.js?v=4"></script>
</body>
</html>
