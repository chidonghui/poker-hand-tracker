<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Hand Tracker</title>
    <link rel="stylesheet" href="css/style.css?v=12">
</head>
<body>
    <div id="app">
        <!-- 记录页面 -->
        <div id="record-page" class="page active">
            <div class="page-title">手牌快速记录</div>
            
            <!-- 三列统计 -->
            <div class="stats-bar">
                <div class="stat-box">
                    <div class="stat-num" id="today-count">0</div>
                    <div class="stat-name">手数</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="today-profit">+0</div>
                    <div class="stat-name">盈亏</div>
                </div>
                <div class="stat-box">
                    <div class="stat-num" id="today-time">0h0m</div>
                    <div class="stat-name">时长</div>
                </div>
            </div>

            <!-- 输入显示 -->
            <div class="input-box">
                <div class="input-text" id="hand-input">输入手牌，如: 67s+15</div>
                <div class="input-example">示例: AKs+1500, JsTs-800, 99+500</div>
                <div class="cards-box" id="preview-area">
                    <div id="preview-cards"></div>
                </div>
            </div>

            <!-- 智能键盘 -->
            <div class="keypad">
                <div class="key-line">
                    <button class="k rank" data-key="A">A</button>
                    <button class="k rank" data-key="K">K</button>
                    <button class="k rank" data-key="Q">Q</button>
                    <button class="k rank" data-key="J">J</button>
                    <button class="k rank" data-key="T">T</button>
                </div>
                <div class="key-line">
                    <button class="k rank" data-key="9">9</button>
                    <button class="k rank" data-key="8">8</button>
                    <button class="k rank" data-key="7">7</button>
                    <button class="k rank" data-key="6">6</button>
                    <button class="k rank" data-key="5">5</button>
                </div>
                <div class="key-line">
                    <button class="k rank" data-key="4">4</button>
                    <button class="k rank" data-key="3">3</button>
                    <button class="k rank" data-key="2">2</button>
                    <button class="k suited" data-key="s">s</button>
                    <button class="k suited" data-key="o">o</button>
                </div>
                <div class="key-line">
                    <button class="k action" data-key="+">+</button>
                    <button class="k action" data-key="-">-</button>
                    <button class="k num" data-key="0">0</button>
                    <button class="k num" data-key="00">00</button>
                    <button class="k del" data-key="backspace">⌫</button>
                </div>
            </div>

            <button class="btn-save" id="save-btn">记录手牌</button>
        </div>

        <!-- 复盘页面 (Hand2Note风格) -->
        <div id="review-page" class="page">
            <!-- 顶部统计栏 -->
            <div class="review-header">
                <div class="date-range" id="date-display">今日</div>
                <div class="main-stats">
                    <div class="main-stat">
                        <div class="main-stat-value" id="review-hands">0</div>
                        <div class="main-stat-label">手数</div>
                    </div>
                    <div class="main-stat">
                        <div class="main-stat-value win" id="review-net">+0</div>
                        <div class="main-stat-label">实际盈亏</div>
                    </div>
                    <div class="main-stat">
                        <div class="main-stat-value" id="review-ev">+0</div>
                        <div class="main-stat-label">EV盈亏</div>
                    </div>
                    <div class="main-stat">
                        <div class="main-stat-value" id="review-bb">0</div>
                        <div class="main-stat-label">bb/100</div>
                    </div>
                </div>
            </div>

            <!-- 走势图 -->
            <div class="chart-box">
                <div class="chart-title">盈亏走势</div>
                <canvas id="profit-chart" width="400" height="150"></canvas>
            </div>

            <!-- 筛选标签 -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">全部</button>
                <button class="filter-tab" data-filter="win">大赢</button>
                <button class="filter-tab" data-filter="loss">大亏</button>
            </div>

            <!-- 手牌列表 -->
            <div class="hand-list" id="hand-list"></div>
        </div>

        <!-- 统计页面 -->
        <div id="stats-page" class="page">
            <div class="page-title">数据统计</div>
            <div class="empty-box">统计功能开发中...</div>
        </div>

        <!-- 底部导航 -->
        <nav class="bottom-nav">
            <button class="nav-item active" data-page="record">
                <span class="icon">📝</span>
                <span>记录</span>
            </button>
            <button class="nav-item" data-page="review">
                <span class="icon">📊</span>
                <span>复盘</span>
            </button>
            <button class="nav-item" data-page="stats">
                <span class="icon">📈</span>
                <span>统计</span>
            </button>
        </nav>

        <!-- 花色弹窗 -->
        <div class="suit-dialog" id="suit-popup" style="display: none;">
            <div class="dialog-title">选择花色</div>
            <div class="suit-options">
                <button class="suit-btn" data-suit="s">♠<span>黑桃</span></button>
                <button class="suit-btn red" data-suit="h">♥<span>红心</span></button>
                <button class="suit-btn red" data-suit="d">♦<span>方块</span></button>
                <button class="suit-btn" data-suit="c">♣<span>梅花</span></button>
            </div>
            <button class="cancel-btn" id="suit-cancel">取消</button>
        </div>
        
        <!-- 牌谱编辑弹窗 -->
        <div class="hand-editor" id="hand-editor" style="display: none;">
            <div class="editor-header">
                <div class="editor-title">编辑牌谱</div>
                <button class="editor-close" id="editor-close">✕</button>
            </div>
            
            <div class="editor-content">
                <!-- 手牌信息 -->
                <div class="editor-hand-info" id="editor-hand-info">
                    <div class="editor-cards" id="editor-cards"></div>
                    <div class="editor-amount" id="editor-amount"></div>
                </div>
                
                <!-- 位置选择 -->
                <div class="editor-section">
                    <div class="section-title">Hero位置</div>
                    <div class="position-btns">
                        <button class="pos-btn" data-pos="UTG">UTG</button>
                        <button class="pos-btn" data-pos="UTG+1">UTG+1</button>
                        <button class="pos-btn" data-pos="UTG+2">UTG+2</button>
                        <button class="pos-btn" data-pos="MP">MP</button>
                        <button class="pos-btn" data-pos="HJ">HJ</button>
                        <button class="pos-btn" data-pos="CO">CO</button>
                        <button class="pos-btn" data-pos="BTN">BTN</button>
                        <button class="pos-btn" data-pos="SB">SB</button>
                        <button class="pos-btn" data-pos="BB">BB</button>
                        <button class="pos-btn" data-pos="STR">STR</button>
                    </div>
                </div>
                
                <!-- 翻牌前行动 -->
                <div class="editor-section">
                    <div class="section-title">翻牌前</div>
                    <input type="text" class="editor-input" id="preflop-action" placeholder="例如: Open 3bb, MP call, BTN call">
                </div>
                
                <!-- Flop -->
                <div class="editor-section">
                    <div class="section-title">Flop</div>
                    <div class="board-input">
                        <input type="text" class="card-input" id="flop-1" placeholder="A" maxlength="2">
                        <input type="text" class="card-input" id="flop-2" placeholder="K" maxlength="2">
                        <input type="text" class="card-input" id="flop-3" placeholder="Q" maxlength="2">
                    </div>
                    <input type="text" class="editor-input" id="flop-action" placeholder="例如: Check, BTN bet 5bb, Hero call">
                </div>
                
                <!-- Turn -->
                <div class="editor-section">
                    <div class="section-title">Turn</div>
                    <div class="board-input">
                        <input type="text" class="card-input" id="turn-card" placeholder="T" maxlength="2">
                    </div>
                    <input type="text" class="editor-input" id="turn-action" placeholder="行动描述">
                </div>
                
                <!-- River -->
                <div class="editor-section">
                    <div class="section-title">River</div>
                    <div class="board-input">
                        <input type="text" class="card-input" id="river-card" placeholder="5" maxlength="2">
                    </div>
                    <input type="text" class="editor-input" id="river-action" placeholder="行动描述">
                </div>
                
                <!-- 备注 -->
                <div class="editor-section">
                    <div class="section-title">备注</div>
                    <textarea class="editor-textarea" id="hand-note" placeholder="添加备注..."></textarea>
                </div>
            </div>
            
            <div class="editor-footer">
                <button class="btn-cancel" id="btn-cancel-edit">取消</button>
                <button class="btn-save-editor" id="btn-save-edit">保存</button>
            </div>
        </div>
        
        <div class="overlay" id="popup-overlay" style="display: none;"></div>
        
        <!-- 卡片选择器弹窗 -->
        <div class="card-picker" id="card-picker" style="display: none;">
            <div class="picker-header">
                <div class="picker-title">选择牌面</div>
                <button class="picker-close" id="picker-close">✕</button>
            </div>
            <div class="picker-content">
                <!-- 黑桃 -->
                <div class="suit-row spades">
                    <div class="suit-label">♠</div>
                    <div class="cards-grid">
                        <button class="card-btn" data-rank="A" data-suit="s">A<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="K" data-suit="s">K<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="Q" data-suit="s">Q<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="J" data-suit="s">J<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="T" data-suit="s">T<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="9" data-suit="s">9<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="8" data-suit="s">8<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="7" data-suit="s">7<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="6" data-suit="s">6<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="5" data-suit="s">5<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="4" data-suit="s">4<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="3" data-suit="s">3<span class="suit-icon">♠</span></button>
                        <button class="card-btn" data-rank="2" data-suit="s">2<span class="suit-icon">♠</span></button>
                    </div>
                </div>
                <!-- 红心 -->
                <div class="suit-row hearts">
                    <div class="suit-label">♥</div>
                    <div class="cards-grid">
                        <button class="card-btn red" data-rank="A" data-suit="h">A<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="K" data-suit="h">K<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="Q" data-suit="h">Q<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="J" data-suit="h">J<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="T" data-suit="h">T<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="9" data-suit="h">9<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="8" data-suit="h">8<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="7" data-suit="h">7<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="6" data-suit="h">6<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="5" data-suit="h">5<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="4" data-suit="h">4<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="3" data-suit="h">3<span class="suit-icon">♥</span></button>
                        <button class="card-btn red" data-rank="2" data-suit="h">2<span class="suit-icon">♥</span></button>
                    </div>
                </div>
                <!-- 方块 -->
                <div class="suit-row diamonds">
                    <div class="suit-label">♦</div>
                    <div class="cards-grid">
                        <button class="card-btn red" data-rank="A" data-suit="d">A<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="K" data-suit="d">K<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="Q" data-suit="d">Q<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="J" data-suit="d">J<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="T" data-suit="d">T<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="9" data-suit="d">9<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="8" data-suit="d">8<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="7" data-suit="d">7<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="6" data-suit="d">6<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="5" data-suit="d">5<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="4" data-suit="d">4<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="3" data-suit="d">3<span class="suit-icon">♦</span></button>
                        <button class="card-btn red" data-rank="2" data-suit="d">2<span class="suit-icon">♦</span></button>
                    </div>
                </div>
                <!-- 梅花 -->
                <div class="suit-row clubs">
                    <div class="suit-label">♣</div>
                    <div class="cards-grid">
                        <button class="card-btn" data-rank="A" data-suit="c">A<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="K" data-suit="c">K<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="Q" data-suit="c">Q<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="J" data-suit="c">J<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="T" data-suit="c">T<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="9" data-suit="c">9<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="8" data-suit="c">8<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="7" data-suit="c">7<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="6" data-suit="c">6<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="5" data-suit="c">5<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="4" data-suit="c">4<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="3" data-suit="c">3<span class="suit-icon">♣</span></button>
                        <button class="card-btn" data-rank="2" data-suit="c">2<span class="suit-icon">♣</span></button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/app.js?v=10"></script>
</body>
</html>
