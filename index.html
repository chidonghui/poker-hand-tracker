<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Poker Hand Tracker - 德州扑克手牌记录</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <div id="app">
        <!-- 记录页面 -->
        <div id="record-page" class="page active">
            <div class="record-header">
                <h1>快速记录</h1>
                <div class="current-time" id="current-time">20:03</div>
            </div>
            
            <!-- 统计卡片 -->
            <div class="stats-row">
                <div class="stat-card">
                    <div class="stat-value" id="today-count">0</div>
                    <div class="stat-label">今日手数</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value win" id="today-profit">+0</div>
                    <div class="stat-label">今日盈亏</div>
                </div>
            </div>

            <!-- 输入区域 -->
            <div class="input-area">
                <div class="input-display" id="hand-input">输入手牌，如: AKS+15</div>
                <div class="input-hint">示例: AKs+1500, JsTs-800, 99+500</div>
                
                <!-- 扑克牌预览 -->
                <div class="cards-preview" id="preview-area">
                    <div class="preview-cards" id="preview-cards"></div>
                </div>
            </div>

            <!-- 键盘区域 -->
            <div class="keyboard">
                <!-- 第一行：牌面 -->
                <div class="key-row">
                    <button class="key rank-btn" data-rank="A">A</button>
                    <button class="key rank-btn" data-rank="K">K</button>
                    <button class="key rank-btn" data-rank="Q">Q</button>
                    <button class="key rank-btn" data-rank="J">J</button>
                </div>
                <!-- 第二行：牌面+花色 -->
                <div class="key-row">
                    <button class="key rank-btn" data-rank="T">T</button>
                    <button class="key suit-btn black" data-key="s">♠</button>
                    <button class="key suit-btn red" data-key="h">♥</button>
                    <button class="key suit-btn red" data-key="d">♦</button>
                </div>
                <!-- 第三行：花色+同花/不同花 -->
                <div class="key-row">
                    <button class="key suit-btn black" data-key="c">♣</button>
                    <button class="key suited-btn" data-key="s-suited">s(同花)</button>
                    <button class="key suited-btn" data-key="o">o(不同花)</button>
                    <button class="key action-btn" data-key="+">+</button>
                </div>
                <!-- 第四行：符号+清除 -->
                <div class="key-row">
                    <button class="key action-btn" data-key="-">-</button>
                    <button class="key backspace-btn" data-key="backspace">清除</button>
                </div>
            </div>

            <!-- 保存按钮 -->
            <button class="save-btn" id="save-btn">记录手牌</button>
        </div>

        <!-- 复盘页面 -->
        <div id="review-page" class="page">
            <div class="page-header">
                <h2>手牌复盘</h2>
                <input type="date" id="date-picker">
            </div>
            <div class="summary-cards">
                <div class="summary-item">
                    <div class="summary-value" id="total-hands">0</div>
                    <div class="summary-label">总手数</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="total-amount">0</div>
                    <div class="summary-label">实际盈亏</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="total-ev">0</div>
                    <div class="summary-label">EV盈亏</div>
                </div>
                <div class="summary-item">
                    <div class="summary-value" id="diff-ev">0</div>
                    <div class="summary-label">差距</div>
                </div>
            </div>
            <div class="sort-bar">
                <span>排序:</span>
                <button class="sort-btn active" data-sort="time">时间</button>
                <button class="sort-btn" data-sort="amount">盈亏</button>
                <button class="sort-btn" data-sort="ev">EV</button>
                <button class="order-btn" id="order-btn">↓</button>
            </div>
            <div class="hand-list" id="hand-list"></div>
        </div>

        <!-- 统计页面 -->
        <div id="stats-page" class="page">
            <div class="page-header"><h2>数据统计</h2></div>
            <div class="stats-content" id="stats-content">
                <div class="empty-state">统计功能开发中...</div>
            </div>
        </div>

        <!-- 底部导航 -->
        <nav class="nav">
            <button class="nav-btn active" data-page="record">
                <span class="nav-icon">📝</span>
                <span class="nav-text">记录</span>
            </button>
            <button class="nav-btn" data-page="review">
                <span class="nav-icon">📊</span>
                <span class="nav-text">复盘</span>
            </button>
            <button class="nav-btn" data-page="stats">
                <span class="nav-icon">📈</span>
                <span class="nav-text">统计</span>
            </button>
        </nav>

        <!-- 花色弹出选择 -->
        <div class="suit-popup" id="suit-popup" style="display: none;">
            <div class="suit-popup-title">选择花色</div>
            <div class="suit-popup-buttons">
                <button class="suit-popup-btn" data-suit="s">♠<span>黑桃</span></button>
                <button class="suit-popup-btn red" data-suit="h">♥<span>红心</span></button>
                <button class="suit-popup-btn red" data-suit="d">♦<span>方块</span></button>
                <button class="suit-popup-btn" data-suit="c">♣<span>梅花</span></button>
            </div>
            <button class="suit-popup-cancel" id="suit-cancel">取消</button>
        </div>
        <div class="popup-overlay" id="popup-overlay" style="display: none;"></div>
    </div>

    <script src="js/app.js?v=3"></script>
</body>
</html>
